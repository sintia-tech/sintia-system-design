name: sintia_system_design
description: "Flutter design system package with configurable theming, and UI components."
version: 0.5.0
homepage: https://sintia.tech
repository: https://github.com/sintia-tech/sintia-system-design
issue_tracker: https://github.com/sintia-tech/sintia-system-design/issues

environment:
  sdk: ^3.11.4
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat.ttf
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans.ttf